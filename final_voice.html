<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Call Weaver</title>
<style>
  :root{ --bg:#0e1014; --phone:#16181f; --screen:#1b1e27; --ink:#eef0f4; --muted:#9aa0ad;
    --dim:#6b7180; --line:#2a2e38; --accent:#46b88c; --accent2:#5fc79e; --red:#e0726b; --user:#243042; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #15281f 0%, var(--bg) 55%);color:var(--ink);padding:20px}
  .phone{width:390px;max-width:100%;height:780px;max-height:94vh;background:var(--phone);
    border:1px solid var(--line);border-radius:42px;box-shadow:0 40px 120px -40px rgba(0,0,0,.8),0 0 0 10px #0a0b0e;
    display:flex;flex-direction:column;overflow:hidden;position:relative}
  .notch{height:30px;display:flex;align-items:center;justify-content:center}
  .notch .pill{width:120px;height:7px;border-radius:7px;background:#000}
  .statusbar{display:flex;justify-content:space-between;padding:2px 24px 6px;font-size:12px;color:var(--muted)}
  .screen{flex:1;display:flex;flex-direction:column;padding:8px 18px 0;overflow:hidden}
  /* idle */
  #idleView{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px}
  .avatar{width:104px;height:104px;border-radius:50%;background:linear-gradient(160deg,#2f6b53,#46b88c);
    display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:46px;color:#0e241b;font-weight:600;
    box-shadow:0 14px 40px -12px rgba(70,184,140,.7);margin-bottom:10px}
  .avatar.ring{animation:ring 1.4s ease-in-out infinite}
  @keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(70,184,140,.5)}50%{box-shadow:0 0 0 18px rgba(70,184,140,0)}}
  .who{font-size:26px;font-weight:600}
  .sub{color:var(--muted);font-size:14px}
  .hint{color:var(--dim);font-size:13px;margin-top:14px;max-width:240px;line-height:1.5}
  /* in-call */
  #callView{flex:1;display:none;flex-direction:column;min-height:0}
  .calltop{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0 12px;border-bottom:1px solid var(--line)}
  .calltop .avatar{width:64px;height:64px;font-size:28px;margin:0 0 4px}
  .calltop .who{font-size:18px}
  .callstatus{color:var(--accent2);font-size:13px;font-variant-numeric:tabular-nums}
  .log{flex:1;overflow-y:auto;padding:14px 2px;display:flex;flex-direction:column;gap:9px}
  .msg{max-width:84%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45}
  .msg.user{align-self:flex-end;background:var(--user)}
  .msg.ai{align-self:flex-start;background:#272a33;border:1px solid var(--line)}
  .caption{align-self:flex-end;color:var(--muted);font-size:13px;font-style:italic;min-height:18px;padding:0 4px}
  .result{align-self:stretch;background:#1f2128;border:1px solid var(--accent);border-radius:14px;padding:14px 16px;
    box-shadow:0 0 0 1px rgba(70,184,140,.15)}
  .result h3{margin:0 0 4px;font-size:15px}
  .result .nm{color:var(--accent2)}
  .result a.link{display:block;text-align:center;background:var(--accent);color:#0e241b;text-decoration:none;
    font-weight:600;padding:11px;border-radius:10px;font-size:14px;margin-top:10px}
  .result a.alt{background:transparent;color:var(--accent2);border:1px solid var(--line)}
  .result .err{color:var(--red);font-size:12.5px;margin-top:8px}
  .result .building{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13.5px}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  /* controls */
  .controls{padding:18px 24px 30px;display:flex;align-items:center;justify-content:center;gap:40px}
  .cbtn{width:70px;height:70px;border-radius:50%;border:0;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:30px;transition:transform .08s, background .15s}
  .cbtn:active{transform:scale(.95)}
  .cbtn.call{background:var(--accent);color:#0e241b;box-shadow:0 12px 36px -10px rgba(70,184,140,.7)}
  .cbtn.call:hover{background:var(--accent2)}
  .cbtn.end{background:var(--red);color:#2a0f0d;display:none}
  .ctrl-label{position:absolute;bottom:12px;width:100%;text-align:center;left:0;color:var(--dim);font-size:12px}
  .banner{margin:0 18px;padding:10px 12px;border-radius:10px;background:rgba(224,114,107,.14);
    border:1px solid rgba(224,114,107,.4);color:#f1b7b3;font-size:12.5px;display:none}
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"><div class="pill"></div></div>
    <div class="statusbar"><span id="clock">9:41</span><span>Weaver · LTE</span></div>

    <div class="screen">
      <div id="idleView">
        <div class="avatar" id="idleAvatar">W</div>
        <div class="who">Weaver</div>
        <div class="sub">AI Website Builder</div>
        <div class="hint">Tap the green button and tell me what website to build. I'll build it and put the live link right here.</div>
      </div>

      <div id="callView">
        <div class="calltop">
          <div class="avatar small" id="callAvatar">W</div>
          <div class="who">Weaver</div>
          <div class="callstatus" id="callStatus">Calling…</div>
        </div>
        <div class="log" id="log"></div>
        <div class="caption" id="caption"></div>
      </div>
    </div>

    <div class="banner" id="banner"></div>

    <div class="controls">
      <button class="cbtn call" id="callBtn" title="Call">📞</button>
      <button class="cbtn end" id="endBtn" title="End call">✕</button>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

let recog = null, callActive = false, speaking = false, busy = false;
let pendingFinal = '', history = [], timer = null, seconds = 0, buildCard = null;

// clock
function tickClock(){ const d=new Date(); $('clock').textContent = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
tickClock(); setInterval(tickClock, 10000);

// health / browser support
(async () => {
  if (!SR) {
    showBanner("This browser can't do voice. Please open this page in Google Chrome or Microsoft Edge.");
    $('callBtn').disabled = true; $('callBtn').style.opacity = .5;
    return;
  }
  try {
    const h = await (await fetch('/health')).json();
    if (!h.gemini) showBanner("GEMINI_API_KEY isn't set on the server — the call can't think without it.");
    else if (!h.anthropic) showBanner("Heads up: no Anthropic key saved, so the build step will fail. Add it in the Weaver builder's Settings.");
  } catch(e){}
})();

function showBanner(text){ const b=$('banner'); b.textContent=text; b.style.display='block'; }

function setStatus(t){ $('callStatus').textContent = t; }
function addMsg(role, text){
  const d=document.createElement('div'); d.className='msg '+role; d.textContent=text;
  $('log').appendChild(d); $('log').scrollTop = $('log').scrollHeight; return d;
}
function setCaption(t){ $('caption').textContent = t || ''; }

// ---- call lifecycle ----
$('callBtn').onclick = startCall;
$('endBtn').onclick  = endCall;

function startCall(){
  if (!SR) return;
  callActive = true; seconds = 0; history = []; pendingFinal=''; buildCard=null;
  $('idleView').style.display = 'none';
  $('callView').style.display = 'flex';
  $('callBtn').style.display = 'none';
  $('endBtn').style.display = 'flex';
  $('callAvatar').classList.add('ring');
  $('log').innerHTML = ''; setCaption('');
  setStatus('Connecting…');

  recog = new SR();
  recog.lang = 'en-US'; recog.interimResults = true; recog.continuous = false; recog.maxAlternatives = 1;
  recog.onresult = onResult;
  recog.onend = onRecogEnd;
  recog.onerror = onRecogError;

  // greet, then listen (the tap is the gesture that unlocks speech)
  startTimer();
  greet();
}

function endCall(){
  callActive = false;
  try { recog && recog.abort(); } catch(e){}
  try { window.speechSynthesis.cancel(); } catch(e){}
  stopTimer();
  $('callAvatar').classList.remove('ring');
  $('callView').style.display = 'none';
  $('idleView').style.display = 'flex';
  $('endBtn').style.display = 'none';
  $('callBtn').style.display = 'flex';
}

function startTimer(){ stopTimer(); timer = setInterval(()=>{ seconds++; const m=String(Math.floor(seconds/60)).padStart(2,'0'); const s=String(seconds%60).padStart(2,'0'); if(!speaking && !busy) setStatus(`Connected · ${m}:${s}`); }, 1000); }
function stopTimer(){ if(timer){ clearInterval(timer); timer=null; } }

async function greet(){
  const GREETING = "Hi! I'm Weaver. What kind of website would you like me to build for you today?";
  addMsg('ai', GREETING);
  await speak(GREETING);
  beginListen();
}

// ---- speech recognition loop ----
function beginListen(){
  if (!callActive || speaking || busy) return;
  setStatus('Listening…'); setCaption('');
  try { recog.start(); } catch(e){ /* already started */ }
}

function onResult(e){
  let interim = '';
  for (let i = e.resultIndex; i < e.results.length; i++){
    const t = e.results[i][0].transcript;
    if (e.results[i].isFinal) pendingFinal += t + ' ';
    else interim += t;
  }
  setCaption(interim || pendingFinal);
  if (pendingFinal.trim()){ try { recog.stop(); } catch(e){} }
}

function onRecogEnd(){
  if (!callActive) return;
  const final = pendingFinal.trim();
  pendingFinal = '';
  if (final){ handleUser(final); }
  else if (!speaking && !busy){ beginListen(); }   // heard nothing, keep listening
}

function onRecogError(e){
  if (e.error === 'not-allowed' || e.error === 'service-not-allowed'){
    showBanner('Microphone blocked. Click the 🔒/camera icon in the address bar and allow the mic, then call again.');
    endCall();
  }
  // 'no-speech' / 'aborted' fall through to onend, which restarts listening
}

async function handleUser(text){
  busy = true; setCaption(''); addMsg('user', text);
  history.push({ role:'user', text });
  setStatus('Thinking…');
  let data = null;
  try {
    const r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text, history }) });
    data = await r.json();
    if (!r.ok || data.error){ addMsg('ai', '⚠ ' + (data.error || 'Something went wrong.')); busy=false; beginListen(); return; }
  } catch(e){ addMsg('ai', '⚠ Network error: ' + e.message); busy=false; beginListen(); return; }

  addMsg('ai', data.reply);
  history.push({ role:'assistant', text: data.reply });
  await speak(data.reply);
  busy = false;

  if (data.build_spec){ runBuild(data.build_spec); }
  else { beginListen(); }
}

async function runBuild(spec){
  busy = true; setStatus('Building…');
  buildCard = document.createElement('div'); buildCard.className = 'result';
  buildCard.innerHTML = '<h3>Building your site…</h3><div class="building"><span class="spin"></span>Generating, then deploying. ~30–60s.</div>';
  $('log').appendChild(buildCard); $('log').scrollTop = $('log').scrollHeight;
  try {
    const r = await fetch('/api/build', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ spec }) });
    const d = await r.json();
    if (!r.ok || d.error){ buildCard.innerHTML = '<h3>Build failed</h3><div class="err">'+escapeHtml(d.error||'Unknown error')+'</div>'; await speak("Sorry, the build didn't work."); busy=false; beginListen(); return; }
    let html = '<h3>✅ Live — <span class="nm">'+escapeHtml(d.name||'site')+'</span></h3>';
    if (d.vercel_url) html += '<a class="link" href="'+d.vercel_url+'" target="_blank">Open deployed site ↗</a>';
    html += '<a class="link alt" href="'+d.local_url+'" target="_blank">Open preview ↗</a>';
    if (d.deploy_error) html += '<div class="err">'+escapeHtml(d.deploy_error)+'</div>';
    buildCard.innerHTML = html;
    $('log').scrollTop = $('log').scrollHeight;
    await speak("All done! Your site is live — the link is on the screen.");
    setStatus('Done · link on screen');
  } catch(e){ buildCard.innerHTML = '<h3>Build failed</h3><div class="err">'+escapeHtml(e.message)+'</div>'; }
  busy = false;
  beginListen();
}

// ---- text to speech (browser) ----
function speak(text){
  return new Promise((resolve)=>{
    if (!('speechSynthesis' in window)){ resolve(); return; }
    speaking = true; setStatus('Speaking…');
    try { recog && recog.abort(); } catch(e){}
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.02; u.pitch = 1.0;
    u.onend = () => { speaking = false; resolve(); };
    u.onerror = () => { speaking = false; resolve(); };
    try { window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }
    catch(e){ speaking = false; resolve(); }
  });
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
